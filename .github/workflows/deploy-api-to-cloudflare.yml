name: Deploy API to Cloudflare Workers

on:
  push:
    branches:
      - main  # Change this to your primary branch if not main
    paths:
      - 'api/**'  # Only trigger on changes in the api directory

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api  # Set working directory to api folder
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'  # Update to match your project's Node.js version
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Build API
        run: npm run build
      
      # Add linting and testing steps if needed
      - name: Run Linting
        run: npm run lint --if-present
      
      - name: Run Tests
        run: npm test --if-present
      
      - name: Publish to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'api'
          command: deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}