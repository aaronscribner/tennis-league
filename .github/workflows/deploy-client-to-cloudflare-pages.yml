name: Deploy Client to Cloudflare Pages

on:
  push:
    branches:
      - main  # Change this to your default branch if different
    paths:
      - 'client/**'  # Only run when files in the client directory change
  workflow_dispatch:  # Allow manual triggering of this workflow

jobs:
  deploy:
    name: Deploy Client to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci
      
      - name: Build client
        working-directory: client
        run: npm run build:worker
      
      - name: Install Cloudflare Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd client
          npx wrangler pages deploy dist --project-name=tennis-league-client --commit-message="Deployed from GitHub Actions"