name: Deploy Client to Cloudflare Pages

on:
  push:
    branches:
      - main  # Change this to your default branch if different
    paths:
      - 'client/**'  # Only run when files in the client directory change
  workflow_dispatch:  # Allow manual triggering of this workflow

jobs:
  deploy:
    name: Deploy Client to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci
      
      - name: Build client
        working-directory: client
        run: npm run build:worker
      
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'client'
          command: pages deploy dist --project-name=maitchplay-client-production --commit-message="Deployed from GitHub Actions"