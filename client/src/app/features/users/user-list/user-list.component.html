<div class="user-list-container">
  <h1>User Management</h1>

  <div class="loading-container" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading users...</p>
  </div>

  <div *ngIf="!loading" class="table-container">
    <mat-card>
      <mat-card-content>
        <table mat-table [dataSource]="users" class="mat-elevation-z0 user-table">
          
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let user"> {{getUserFullName(user)}} </td>
          </ng-container>

          <!-- Email Column -->
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef> Email </th>
            <td mat-cell *matCellDef="let user"> {{user.email}} </td>
          </ng-container>

          <!-- Skill Level Column -->
          <ng-container matColumnDef="skillLevel">
            <th mat-header-cell *matHeaderCellDef> Skill Level </th>
            <td mat-cell *matCellDef="let user"> 
              <mat-form-field class="skill-level-input" appearance="outline" 
                              *ngIf="user._id && user._id !== currentUserId">
                <input matInput type="number" min="3.00" max="5.00" step="0.01"
                       [ngModel]="editableUsers.get(user._id!)?.skillLevel?.toFixed(2) || '3.00'"
                       (ngModelChange)="updateSkillLevel(user._id!, $event)">
              </mat-form-field>
              <div *ngIf="!user._id || user._id === currentUserId">
                {{ user.skillLevel?.toFixed(2) || '3.00' }}
              </div>
            </td>
          </ng-container>

          <!-- Role Column -->
          <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef> Role </th>
            <td mat-cell *matCellDef="let user">
              <span [ngClass]="{'coordinator-badge': isCoordinator(user)}">
                {{ isCoordinator(user) ? 'Coordinator' : 'Player' }}
              </span>
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Status </th>
            <td mat-cell *matCellDef="let user">
              <span [ngClass]="{
                'status-active': user.isActive,
                'status-inactive': !user.isActive
              }">
                {{ user.isActive ? 'Active' : 'Paused' }}
              </span>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let user">
              <div class="action-buttons" *ngIf="user._id !== currentUserId">
                <!-- Pause/Play Button -->
                <button mat-icon-button color="primary" 
                        [matTooltip]="user.isActive ? 'Pause user' : 'Activate user'"
                        (click)="toggleUserStatus(user._id!)">
                  <mat-icon>{{ user.isActive ? 'pause' : 'play_arrow' }}</mat-icon>
                </button>

                <!-- Save Button -->
                <button mat-icon-button color="accent" 
                        matTooltip="Save changes"
                        (click)="saveUser(user._id!)">
                  <mat-icon>save</mat-icon>
                </button>

                <!-- Make/Remove Coordinator Button -->
                <button mat-icon-button
                        [color]="isCoordinator(user) ? 'warn' : 'primary'"
                        [matTooltip]="isCoordinator(user) ? 'Remove coordinator role' : 'Make coordinator'"
                        (click)="updateUserRole(user._id!, !isCoordinator(user))">
                  <mat-icon>{{ isCoordinator(user) ? 'person_remove' : 'admin_panel_settings' }}</mat-icon>
                </button>

                <!-- Delete Button -->
                <button mat-icon-button color="warn" 
                        matTooltip="Delete user"
                        (click)="deleteUser(user._id!)">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
              <div *ngIf="user._id === currentUserId" class="current-user-note">
                <i>(Current User)</i>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
</div>
