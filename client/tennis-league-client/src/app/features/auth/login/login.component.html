<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Tennis League Login</mat-card-title>
    </mat-card-header>
    <img mat-card-image src="assets/tennis-banner.jpg" alt="Tennis court image">
    <mat-card-content>
      <p>
        Welcome to the Tennis League application. Please log in to view events, register for matches, and see your match schedules.
      </p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="login()">
        <mat-icon>login</mat-icon>
        Login with Auth0
      </button>
    </mat-card-actions>
  </mat-card>
</div>
