<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Tennis League</mat-card-title>
      <mat-card-subtitle>Log in to your account</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>Welcome to the Tennis League App. Please log in to access your account and manage your tennis events.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="login()">
        <mat-icon>login</mat-icon>
        Login with Auth0
      </button>
    </mat-card-actions>
  </mat-card>
</div>
